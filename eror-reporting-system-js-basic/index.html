<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>laporkan eror</title>
  <link rel="stylesheet" href="style.css" >
</head>
<body>
  <!--eror reporting system html -->
  <div class="container">
    <div class="form-card">
    <h1>Laporkan Eror Hari ini</h1>
    <p class="subtitle">Isi Form dibawah ini untuk mendokumentasikan eror</p>

  <form id="errorForm">
    <div class="form-group">
    <label for="judul">Judul Eror</label>
    <input id="judul" type="text" placeholder="Contoh: login gagal di halaman utama" required>
      </div>
    <br><br>

    <!-- Dua kolom sejajar dengan flexbox-->
     <div class="form-row">
      <div class="form-group">
        <label for="prioritas">Prioritas</label>
        <select id="prioritas">
          <option value="low">Low</option>
          <option value="medium">Medium</option>
          <option value="high">High</option>
        </select>
      </div>

      <div class="form-group">
        <label for="kategori">Kategori</label>
        <select id="kategori">
          <option value="ui">UI / tampilan</option>
          <option value="api">API / Backend</option>
          <option value="database">Database</option>
          <option value="other">Lainya</option>
        </select>
      </div>
     </div>


    <div class="form-group">
    <label for="deskripsi">Deskripsi</label><br>
    <textarea id="deskripsi" rows="4" placeholder="Jelaskan langkah yang menyebabkan error..." required></textarea>
    </div>

    <div class="form-group">
    <label for="pelapor">Nama Pelapor</label>
    <input id="pelapor" type="text" placeholder="nama kamu" required>
    </div>

    <div class="btn-row">
    <button type="reset" class="btn-reset">Reset</button>
    <button type="submit" class="btn-submit">Kirim Laporan</button>
    </div>
  </form>
    </div>

    <!--untuk nampilin card-->
    <div class="card">
      <h2>Daftar Laporan (<span id="jumlah">0</span>)</h2>
      <div id="daftarLaporan">
        <p id="emptyState">Belum ada laporan. isi form diatas !</p>
      </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
